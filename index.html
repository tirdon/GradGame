<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <!-- Primary Meta Tags -->
        <title>GradGame — The Ultimate College Graduation Simulator</title>
        <meta name="title" content="GradGame — The Ultimate College Graduation Simulator">
        <meta name="description" content="Embark on an epic collegiate adventure. highly interactive simulation game.">
        <meta name="keywords" content="GradGame, interactive web game">
        <meta name="author" content="GradGame Team">
        <meta name="robots" content="index, follow">

        <!-- Theme Color & Mobile Apps -->
        <meta name="theme-color" content="#6366f1">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

        <!-- Favicon (Modern Self-Contained SVG) -->
        <link rel="icon" type="image/svg+xml" href="data:image/svg+xml, <svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🎓</text></svg>">

        <!-- Premium Academic Typography (Google Fonts: EB Garamond & Lora) -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">

        <!-- Global Stylesheet -->
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="card" id="session-new">
            <canvas id="canvas-new"></canvas>
            <div class="card-content">
                <span class="card-icon">🎓</span>
                <h2>New Adventure</h2>
                <p>Start a new academic life and build your legacy.</p>
                <output id="wasm-add-result" aria-live="polite">Loading Swift Wasm...</output>
            </div>
        </div>
        <input class="card" id="session-load" type="text" placeholder="Enter session code...">

        <script src="gradgame-canvas.js"></script>
        <script async src="gradgame-wasm.js"></script>
    </body>
</html>
